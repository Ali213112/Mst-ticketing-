apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketchain-api
  labels:
    app: ticketchain-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketchain-api
  template:
    metadata:
      labels:
        app: ticketchain-api
    spec:
      containers:
        - name: api
          image: ticketchain/api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: ticketchain-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ticketchain-api
spec:
  selector:
    app: ticketchain-api
  ports:
    - port: 5000
      targetPort: 5000
